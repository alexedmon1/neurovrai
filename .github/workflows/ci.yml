name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# A green run here == the gate passed == the commit is safe to tag and pin
# in a research project. See plans/main-plan.md.
env:
  # Pre-opt into Node 24 ahead of GitHub's 2026-06-02 forced migration
  # (setup-uv@v6 still ships a Node 20 runtime as of this writing).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gate:
    name: gate (tests + regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Sync dev environment
        run: uv sync --extra dev

      - name: Gate — tests + regression (blocking)
        run: make check

      - name: Advisory — ruff + mypy (informational, never fails the build)
        if: always()
        continue-on-error: true
        run: make advisory
